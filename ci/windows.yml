# Native Windows (MSVC) build of OPM flow_blackoil.
#
# Reference GitHub Actions workflow. Intended to live at
#   opm-simulators/.github/workflows/windows.yml
# and assumes the Windows build harness (setup-env.ps1, build-module.ps1,
# build-all.ps1) is committed in opm-simulators under  windows/ .
# The compat\include shims are generated by build-all.ps1, so they need not be
# committed.
#
# A windows-2022 runner already provides VS 2022 (MSVC + Windows SDK), CMake and
# Ninja, so the toolchain-install step from BUILD_WINDOWS.md is skipped here.

name: windows-flow

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

env:
  DUNE_VERSION: v2.10.0
  # Use the GitHub Actions cache as a vcpkg binary cache so dependency builds are
  # incremental across runs.
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      # vcpkg's x-gha binary cache needs these two values exported as env vars.
      - name: Export GitHub Actions cache endpoints (for vcpkg)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ---- sources ---------------------------------------------------------
      # Lay everything out under  D:\opm  (the "OPM_ROOT" of BUILD_WINDOWS.md).
      - name: Checkout opm-simulators
        uses: actions/checkout@v4
        with:
          path: opm/src/opm-simulators

      - name: Checkout opm-common
        uses: actions/checkout@v4
        with:
          repository: OPM/opm-common
          path: opm/src/opm-common

      - name: Checkout opm-grid
        uses: actions/checkout@v4
        with:
          repository: OPM/opm-grid
          path: opm/src/opm-grid

      - name: Clone DUNE core modules (pinned)
        run: |
          $root = "${{ github.workspace }}/opm"
          foreach ($m in 'dune-common','dune-geometry','dune-grid','dune-istl') {
            git clone --branch $env:DUNE_VERSION --depth 1 `
              "https://gitlab.dune-project.org/core/$m.git" "$root/src/$m"
          }

      # ---- vcpkg -----------------------------------------------------------
      - name: Bootstrap vcpkg
        run: |
          $root = "${{ github.workspace }}/opm"
          git clone https://github.com/microsoft/vcpkg.git "$root/vcpkg"
          & "$root/vcpkg/bootstrap-vcpkg.bat" -disableMetrics

      # ---- build harness ---------------------------------------------------
      # Copy the harness scripts to the build root so build-all.ps1 resolves its
      # $Root (script directory) to the layout root containing src/ vcpkg/ etc.
      - name: Stage build harness
        run: |
          $root = "${{ github.workspace }}/opm"
          Copy-Item "$root/src/opm-simulators/windows/*.ps1" $root -Force

      # ---- build -----------------------------------------------------------
      - name: Load MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build flow_blackoil
        run: |
          $root = "${{ github.workspace }}/opm"
          # Clone + DUNE checkout already done above; deps via build-all (cached
          # by vcpkg's x-gha binary cache).
          & "$root/build-all.ps1" -SkipClone

      # ---- artifact / smoke test ------------------------------------------
      - name: Smoke test (--help)
        run: |
          $exe = "${{ github.workspace }}/opm/build/opm-simulators/bin/flow_blackoil.exe"
          & $exe --help | Select-Object -First 3

      - name: Upload flow_blackoil.exe
        uses: actions/upload-artifact@v4
        with:
          name: flow_blackoil-windows-x64
          path: |
            ${{ github.workspace }}/opm/build/opm-simulators/bin/flow_blackoil.exe
            ${{ github.workspace }}/opm/build/opm-simulators/bin/*.dll
